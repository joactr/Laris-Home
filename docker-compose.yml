services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: larishome
      POSTGRES_USER: larishome
      POSTGRES_PASSWORD: larishome
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  db-backup:
    image: postgres:16
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PGPASSWORD: ${DB_BACKUP_PASSWORD:-larishome}
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: ${DB_BACKUP_DATABASE:-larishome}
      PGUSER: ${DB_BACKUP_USER:-larishome}
      BACKUP_INTERVAL_SECONDS: ${DB_BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETENTION_DAYS: ${DB_BACKUP_RETENTION_DAYS:-7}
      BACKUP_DIR: /backups
    volumes:
      - ./ops/db-backup/backup.sh:/usr/local/bin/backup.sh:ro
      - ./backups/postgres:/backups
    command: ["sh", "/usr/local/bin/backup.sh"]

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      - db
    env_file: .env
    environment:
      DATABASE_URL: postgres://larishome:larishome@db:5432/larishome
      JWT_SECRET: supersecretjwtkey_changeme
      PORT: 4000
    ports:
      - "4000:4000"
    volumes:
      - ./server:/app
      - /app/node_modules
    command: npm run dev

  client:
    build: ./client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  pgdata:
